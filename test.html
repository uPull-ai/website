<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>uPull.ai</title>
  <style>
    :root{
      --bg:#f7fbff;
      --bg2:#eef6fc;
      --panel:#ffffff;
      --panel2:#f1f6fb;
      --text:#003087;
      --muted:#4a657a;
      --line:#c8d9eb;
      --accent:#005eb8;
      --accent2:#ed8b00;
      --accent3:#00a3e0;
      --shadow:0 18px 50px rgba(0,94,184,.10);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(0,94,184,.08), transparent 30%),
        radial-gradient(circle at 20% 30%, rgba(237,139,0,.08), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    a{text-decoration:none;color:inherit}
    .wrap{max-width:1240px;margin:0 auto;padding:0 24px}

    .nav{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(0,94,184,.08);
    }
    .navin{
      display:flex;
      align-items:center;
      justify-content:space-between;
      height:76px;
    }
    .brand{
      font-weight:800;
      letter-spacing:.2px;
      color:var(--accent);
      display:flex;
      align-items:center;
      gap:10px;
    }
    .brand:before{
      content:"";
      width:12px;
      height:12px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 0 16px rgba(0,94,184,.2);
    }
    .menu{
      display:flex;
      gap:28px;
      color:var(--muted);
      font-size:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:14px 20px;
      border:1px solid transparent;
      font-weight:700;
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      box-shadow:0 18px 44px rgba(0,94,184,.14);
    }
    .btn.ghost{
      border-color:rgba(0,94,184,.16);
      color:var(--accent);
      background:#fff;
    }

    .hero{padding:64px 0 38px}
    .heroGrid{
      display:grid;
      grid-template-columns:1fr 1.18fr;
      gap:34px;
      align-items:stretch;
    }

    .heroCopy{
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:10px 0;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(0,94,184,.10);
      color:var(--muted);
      font-size:13px;
      width:fit-content;
      box-shadow:0 10px 24px rgba(0,94,184,.04);
    }
    .eyebrow .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--accent2);
      box-shadow:0 0 14px rgba(237,139,0,.35);
    }

    h1{
      font-size:clamp(42px,5vw,74px);
      line-height:.92;
      margin:18px 0 16px;
      letter-spacing:-.045em;
      color:var(--accent);
      max-width:12ch;
    }
    .sub{
      font-size:18px;
      line-height:1.65;
      color:var(--muted);
      max-width:52ch;
      margin:0;
    }

    .cta{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:28px;
    }

    .micro{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:26px;
    }
    .microCard{
      background:#fff;
      border:1px solid rgba(0,94,184,.10);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--shadow);
    }
